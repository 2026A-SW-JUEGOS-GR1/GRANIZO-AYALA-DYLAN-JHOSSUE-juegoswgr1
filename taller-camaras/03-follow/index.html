<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>FollowCamera - Pelota en Movimiento</title>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; margin: 0; padding: 0; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = () => {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0.05, 0.05, 0.2, 1);

            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 1;

            const ground = BABYLON.MeshBuilder.CreateGround("ground", { width: 30, height: 30 }, scene);
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.2, 0.4, 0.2);
            ground.material = groundMat;

            const ball = BABYLON.MeshBuilder.CreateSphere("ball", { diameter: 1.5 }, scene);
            const ballMat = new BABYLON.StandardMaterial("ballMat", scene);
            ballMat.diffuseColor = new BABYLON.Color3(1, 0.4, 0.1);
            ballMat.emissiveColor = new BABYLON.Color3(0.3, 0.1, 0);
            ball.material = ballMat;
            ball.position = new BABYLON.Vector3(10, 0.75, 0);

            const camera = new BABYLON.FollowCamera("cam", new BABYLON.Vector3(0, 5, -10), scene);
            camera.lockedTarget = ball;
            camera.radius = 10;
            camera.heightOffset = 4;
            camera.rotationOffset = 0;
            camera.cameraAcceleration = 0.05;
            camera.maxCameraSpeed = 20;

            for (let i = 0; i < 8; i++) {
                const a = (i / 8) * Math.PI * 2;
                const obs = BABYLON.MeshBuilder.CreateBox("obs" + i, { size: 1.5 }, scene);
                obs.position = new BABYLON.Vector3(Math.cos(a) * 4, 0.75, Math.sin(a) * 4);
                const mat = new BABYLON.StandardMaterial("obsMat" + i, scene);
                mat.diffuseColor = new BABYLON.Color3(0.5, 0.5, 0.8);
                obs.material = mat;
            }

            let angle = 0;
            scene.registerBeforeRender(() => {
                angle += 0.02;
                ball.position.x = Math.cos(angle) * 10;
                ball.position.z = Math.sin(angle) * 10;
                ball.rotation.y = -angle + Math.PI / 2;
            });

            return scene;
        };

        const scene = createScene();
        engine.runRenderLoop(() => scene.render());
        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
