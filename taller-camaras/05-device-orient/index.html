<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>DeviceOrientationCamera - Visor 360°</title>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; margin: 0; padding: 0; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
        #hint {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            color: white; font-family: sans-serif; font-size: 14px;
            background: rgba(0,0,0,0.6); padding: 8px 14px; border-radius: 6px;
            text-align: center; white-space: nowrap;
        }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <div id="hint">📱 En celular: incliná el dispositivo · En PC: arrastrá con el mouse</div>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = () => {
            const scene = new BABYLON.Scene(engine);

            const camera = new BABYLON.DeviceOrientationCamera("cam", new BABYLON.Vector3(0, 0, 0), scene);
            camera.setTarget(new BABYLON.Vector3(0, 0, 1));
            camera.attachControl(canvas, true);
            camera.minZ = 0.1;

            // Skybox: una caja enorme vista desde adentro
            const skybox = BABYLON.MeshBuilder.CreateBox("skybox", { size: 300 }, scene);
            const skyboxMat = new BABYLON.StandardMaterial("skyboxMat", scene);
            skyboxMat.backFaceCulling = false;
            skyboxMat.diffuseColor = new BABYLON.Color3(0, 0, 0);
            skyboxMat.specularColor = new BABYLON.Color3(0, 0, 0);
            skyboxMat.emissiveColor = new BABYLON.Color3(0.02, 0.02, 0.1);
            skybox.material = skyboxMat;

            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 0.6;

            const objectsData = [
                { pos: new BABYLON.Vector3(5, 0, 8),   color: new BABYLON.Color3(1, 0.3, 0.3), type: "sphere" },
                { pos: new BABYLON.Vector3(-6, 2, 7),  color: new BABYLON.Color3(0.3, 1, 0.5), type: "box" },
                { pos: new BABYLON.Vector3(3, -2, 9),  color: new BABYLON.Color3(0.3, 0.5, 1), type: "sphere" },
                { pos: new BABYLON.Vector3(-4, -1, 6), color: new BABYLON.Color3(1, 1, 0.3),   type: "box" },
                { pos: new BABYLON.Vector3(0, 4, 10),  color: new BABYLON.Color3(1, 0.5, 1),   type: "sphere" },
                { pos: new BABYLON.Vector3(8, 1, 5),   color: new BABYLON.Color3(0.5, 1, 1),   type: "box" },
                { pos: new BABYLON.Vector3(-8, -3, 8), color: new BABYLON.Color3(1, 0.7, 0.3), type: "sphere" },
                { pos: new BABYLON.Vector3(0, -4, 7),  color: new BABYLON.Color3(0.8, 0.3, 1), type: "box" },
            ];

            const meshes = objectsData.map((obj, i) => {
                const mesh = obj.type === "sphere"
                    ? BABYLON.MeshBuilder.CreateSphere("obj" + i, { diameter: 1.2 }, scene)
                    : BABYLON.MeshBuilder.CreateBox("obj" + i, { size: 1 }, scene);
                mesh.position = obj.pos;
                const mat = new BABYLON.StandardMaterial("mat" + i, scene);
                mat.emissiveColor = obj.color;
                mesh.material = mat;
                return { mesh, baseY: obj.pos.y, phase: Math.random() * Math.PI * 2 };
            });

            let t = 0;
            scene.registerBeforeRender(() => {
                t += 0.01;
                meshes.forEach(m => {
                    m.mesh.position.y = m.baseY + Math.sin(t + m.phase) * 0.3;
                    m.mesh.rotation.y += 0.01;
                });
            });

            return scene;
        };

        const scene = createScene();
        engine.runRenderLoop(() => scene.render());
        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
